<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <title>Endre passord</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 10px;
      width: 320px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    }

    h2 {
      margin-bottom: 20px;
      text-align: center;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      font-size: 16px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      cursor: pointer;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 5px;
    }

    button:disabled {
      background: #aaa;
      cursor: not-allowed;
    }

    .error {
      color: red;
      font-size: 14px;
      margin-bottom: 10px;
      min-height: 18px;
    }

    .success {
      color: green;
      text-align: center;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div class="card">
  <h2>Nytt passord</h2>

  <input type="password" id="password1" placeholder="Nytt passord">
  <input type="password" id="password2" placeholder="Bekreft passord">

  <div id="error" class="error"></div>

  <button id="saveBtn" disabled>Lagre</button>

  <div id="success" class="success"></div>
</div>

<script type="module">
import { auth, db } from "./firebase-refleksjon.js";
import { updatePassword } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-auth.js";
import { doc, updateDoc } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-firestore.js";

const p1 = document.getElementById("password1");
const p2 = document.getElementById("password2");
const btn = document.getElementById("saveBtn");
const error = document.getElementById("error");
const success = document.getElementById("success");

// 🔍 Validering live
function validate() {
  const pass1 = p1.value;
  const pass2 = p2.value;

  if (pass1.length < 8) {
    error.textContent = "Minst 8 tegn";
    btn.disabled = true;
    return;
  }

  if (pass1 !== pass2) {
    error.textContent = "Passordene er ikke like";
    btn.disabled = true;
    return;
  }

  error.textContent = "";
  btn.disabled = false;
}

p1.addEventListener("input", validate);
p2.addEventListener("input", validate);

// 💾 Lagre
btn.onclick = async () => {
  try {
    await updatePassword(auth.currentUser, p1.value);

    await updateDoc(doc(db, "users", auth.currentUser.uid), {
      mustChangePassword: false
    });

    success.textContent = "Passord oppdatert!";

    setTimeout(() => {
      window.location.href = "minside.html";
    }, 1500);

  } catch (err) {
    console.error(err);
    error.textContent = "Noe gikk galt. Prøv igjen.";
  }
};
</script>

</body>
</html>
